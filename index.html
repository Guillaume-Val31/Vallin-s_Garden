<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vallin's Garden V4</title>
    <style>
        :root {
            --primary: #4CAF50; --dark: #2E7D32; --light: #F1F8E9; --text: #333;
            --empty: #ffcdd2; --partial: #81c784; --full: #1b5e20; --accent: #FF9800;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--light); color: var(--text); padding-bottom: 30px;}
        header { background-color: var(--primary); color: white; padding: 10px; text-align: center; position: relative; display: flex; flex-direction: column; gap: 5px;}
        .nav-buttons { display: flex; justify-content: center; gap: 10px; }
        .nav-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 5px 10px; border-radius: 4px; font-size: 0.8rem; cursor: pointer; }
        .nav-btn.active { background: white; color: var(--dark); font-weight: bold; }
        
        .container { padding: 15px; }
        .hidden { display: none; }
        .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px;}
        
        /* GRILLE JARDIN */
        .garden-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; }
        .section { aspect-ratio: 1 / 3; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.7rem; cursor: pointer; border: 1px solid rgba(0,0,0,0.1); }
        .section.empty-cell { background: transparent; border:none; }

        /* VUE SECTION */
        .subsection-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; margin-bottom: 15px; }
        .subsection { background: white; border: 1px solid #ccc; border-radius: 4px; padding: 3px; text-align: center; position: relative; min-height: 50px; font-size: 0.6rem; }
        .plant-info { font-weight:bold; color: var(--dark); margin-top: 5px; display: block;}
        .check-case { position: absolute; top: 1px; right: 1px; }

        /* PLANNING */
        .harvest-item { display: flex; align-items: center; gap: 10px; padding: 10px; border-bottom: 1px solid #eee; }
        .harvest-date { background: var(--accent); color: white; padding: 5px; border-radius: 5px; font-size: 0.7rem; min-width: 60px; text-align: center; }

        /* BASE & FORM */
        .btn { background-color: var(--primary); color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-del { background: #ff5252; color: white; border: none; padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; float: right; }
        .decade-row { display: flex; gap: 3px; margin-bottom: 8px; }
        select, input { padding: 8px; border-radius: 4px; border: 1px solid #ddd; }
    </style>
</head>
<body>

    <header>
        <div style="font-weight: bold; font-size: 1.1rem;">Vallin's Garden</div>
        <div class="nav-buttons">
            <button class="nav-btn active" id="btn-garden" onclick="showView('garden-view')">Jardin</button>
            <button class="nav-btn" id="btn-planning" onclick="showView('planning-view')">Planning Récolte</button>
            <button class="nav-btn" id="btn-db" onclick="showView('db-view')">Ma Base</button>
        </div>
    </header>

    <div class="container">
        
        <div id="garden-view">
            <div class="garden-grid" id="grid-container"></div>
            <button class="btn" style="background:#607D8B; margin-top:20px;" onclick="exportHistory()">⬇ Exporter Historique CSV</button>
        </div>

        <div id="section-view" class="hidden">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3 id="current-section-title"></h3>
                <button onclick="showView('garden-view')" style="border:none; background:none; color:var(--dark); font-weight:bold;">✕ Fermer</button>
            </div>
            <div class="subsection-grid" id="subsections-container"></div>
            <div class="card">
                <label>Variété</label>
                <select id="plant-select" style="width:100%; margin-bottom:10px;"></select>
                <label>Date de l'action</label>
                <input type="date" id="plant-date" style="width:100%; margin-bottom:10px;">
                <button class="btn" onclick="savePlanting()">Enregistrer la sélection</button>
                <button class="btn" style="background:#aaa;" onclick="clearSelected()">Vider la sélection</button>
            </div>
        </div>

        <div id="planning-view" class="hidden">
            <h3>Prochaines Récoltes</h3>
            <div id="planning-list" class="card" style="padding:0;">
                </div>
        </div>

        <div id="db-view" class="hidden">
            <div class="card">
                <h4>Nouvelle Espèce</h4>
                <input type="text" id="new-plant-name" placeholder="Nom (ex: Fraise Charlotte)" style="width:100%; margin-bottom:10px;">
                <div class="decade-row">Semis : <select id="s-start"></select> à <select id="s-end"></select></div>
		    <div class="decade-row">Plantation : <select id="p-start"></select> à <select id="p-end"></select></div>
                <div class="decade-row">Récolte : <select id="r-start"></select> à <select id="r-end"></select></div>
                <button class="btn" onclick="addPlantToDB()">Ajouter à la base</button>
            </div>
            <div id="plants-list"></div>
        </div>

    </div>

    <script>
        const months = ["Jan", "Fév", "Mar", "Avr", "Mai", "Juin", "Juil", "Août", "Sept", "Oct", "Nov", "Déc"];
        const decades = [];
        months.forEach(m => { [1,2,3].forEach(d => decades.push(`${m} D${d}`)); });

        let appData = JSON.parse(localStorage.getItem('vallinsGardenV4')) || { garden: {}, plants: {}, history: [] };
        let currentSection = null;

        function init() {
            populateDecadeSelects();
            updatePlantSelect();
            renderGarden();
            document.getElementById('plant-date').valueAsDate = new Date();
        }

        function populateDecadeSelects() {
            ['s-start', 's-end', 'p-start', 'p-end','r-start', 'r-end'].forEach(id => {
                const el = document.getElementById(id);
                el.innerHTML = '<option value="-">N/A</option>';
                decades.forEach((d, i) => el.innerHTML += `<option value="${i}">${d}</option>`);
            });
        }

        function showView(viewId) {
            ['garden-view', 'section-view', 'planning-view', 'db-view'].forEach(v => document.getElementById(v).classList.add('hidden'));
            document.getElementById(viewId).classList.remove('hidden');
            
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if(viewId !== 'section-view') {
                const btnId = 'btn-' + viewId.replace('-view', '');
                document.getElementById(btnId).classList.add('active');
            }

            if(viewId === 'garden-view') renderGarden();
            if(viewId === 'db-view') renderDB();
            if(viewId === 'planning-view') renderPlanning();
        }

        function renderGarden() {
            const layout = ['A1','A2','A3','A4','A5','A6','B1','B2','B3','B4','B5','B6',null,null,null,'C4','C5','C6'];
            const grid = document.getElementById('grid-container'); grid.innerHTML = '';
            layout.forEach(id => {
                const div = document.createElement('div');
                if (!id) { div.className = 'section empty-cell'; } 
                else {
                    div.className = 'section'; div.textContent = id;
                    div.onclick = () => openSection(id);
                    const count = Object.keys(appData.garden[id] || {}).length;
                    div.style.backgroundColor = count === 0 ? 'var(--empty)' : (count === 27 ? 'var(--full)' : 'var(--partial)');
                    if(count === 27) div.style.color = 'white';
                }
                grid.appendChild(div);
            });
        }

        function openSection(id) {
            currentSection = id;
            document.getElementById('current-section-title').textContent = `Section ${id}`;
            showView('section-view');
            renderSubsections();
        }

        function renderSubsections() {
            const container = document.getElementById('subsections-container'); container.innerHTML = '';
            const data = appData.garden[currentSection] || {};
            for (let i = 1; i <= 27; i++) {
                const sub = document.createElement('div'); sub.className = 'subsection';
                const plant = data[i] ? appData.plants[data[i].plantId] : null;
                sub.innerHTML = `<input type="checkbox" class="check-case" value="${i}"><br>${i}<span class="plant-info">${plant ? plant.name : ''}</span>`;
                if(plant) sub.style.background = "#e8f5e9";
                container.appendChild(sub);
            }
        }

        function savePlanting() {
            const pId = document.getElementById('plant-select').value;
            const date = document.getElementById('plant-date').value;
            const selected = Array.from(document.querySelectorAll('.check-case:checked')).map(cb => cb.value);
            if(!pId || selected.length === 0) return alert("Sélectionnez une plante et des cases");
            
            if(!appData.garden[currentSection]) appData.garden[currentSection] = {};
            selected.forEach(c => {
                appData.garden[currentSection][c] = { plantId: pId, date: date };
                appData.history.push({ year: new Date(date).getFullYear(), sec: currentSection, case: c, plant: appData.plants[pId].name, date: date });
            });
            save(); renderSubsections();
        }

        function clearSelected() {
            const selected = Array.from(document.querySelectorAll('.check-case:checked')).map(cb => cb.value);
            if(selected.length === 0) return;
            selected.forEach(c => delete appData.garden[currentSection][c]);
            save(); renderSubsections();
        }

        function renderDB() {
            const list = document.getElementById('plants-list');
            list.innerHTML = '<h4>Ma Collection</h4>';
            Object.keys(appData.plants).forEach(id => {
                const p = appData.plants[id];
                list.innerHTML += `<div class="card" style="margin-bottom:10px;">
                    <button class="btn-del" onclick="deletePlant('${id}')">🗑️</button>
                    <strong>${p.name}</strong><br>
                    <small>Récolte : ${decades[p.recolte[0]] || '?'} à ${decades[p.recolte[1]] || '?'}</small>
                </div>`;
            });
        }

        function addPlantToDB() {
            const name = document.getElementById('new-plant-name').value;
            if(!name) return;
            const id = 'p_' + Date.now();
            appData.plants[id] = {
                name,
                semis: [document.getElementById('s-start').value, document.getElementById('s-end').value],
		    plantation: [document.getElementById('p-start').value, document.getElementById('p-end').value],
                recolte: [document.getElementById('r-start').value, document.getElementById('r-end').value]
            };
            save(); renderDB(); updatePlantSelect();
            document.getElementById('new-plant-name').value = '';
        }

        function deletePlant(id) {
            if(confirm("Supprimer cette espèce de la base ?")) {
                delete appData.plants[id];
                save(); renderDB(); updatePlantSelect();
            }
        }

        function updatePlantSelect() {
            const sel = document.getElementById('plant-select');
            sel.innerHTML = '<option value="">-- Variété --</option>';
            Object.keys(appData.plants).forEach(id => {
                sel.innerHTML += `<option value="${id}">${appData.plants[id].name}</option>`;
            });
        }

        function renderPlanning() {
            const list = document.getElementById('planning-list');
            list.innerHTML = '';
            let items = [];

            // Parcourir tout le jardin pour trouver les plantes
            Object.keys(appData.garden).forEach(secId => {
                Object.keys(appData.garden[secId]).forEach(caseId => {
                    const entry = appData.garden[secId][caseId];
                    const plant = appData.plants[entry.plantId];
                    if(plant && plant.recolte[0] !== "-") {
                        items.push({
                            sec: secId,
                            case: caseId,
                            name: plant.name,
                            startDecade: parseInt(plant.recolte[0]),
                            label: decades[plant.recolte[0]]
                        });
                    }
                });
            });

            // Trier par chronologie de récolte (décade)
            items.sort((a, b) => a.startDecade - b.startDecade);

            if(items.length === 0) {
                list.innerHTML = '<p style="padding:15px; color:#999;">Rien à récolter pour le moment.</p>';
                return;
            }

            items.forEach(item => {
                list.innerHTML += `
                    <div class="harvest-item">
                        <div class="harvest-date">${item.label}</div>
                        <div>
                            <strong>${item.name}</strong><br>
                            <small>Sect. ${item.sec} / Case ${item.case}</small>
                        </div>
                    </div>`;
            });
        }

        function save() { localStorage.setItem('vallinsGardenV4', JSON.stringify(appData)); }
        
        function exportHistory() {
            let csv = "Annee,Section,Case,Plante,Date\n";
            appData.history.forEach(h => { csv += `${h.year},${h.sec},${h.case},"${h.plant}",${h.date}\n`; });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'jardin_historique.csv'; a.click();
        }

        init();
    </script>
</body>
</html>
